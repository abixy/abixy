<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CozyBoard</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(180deg, #1e2a38, #121a24);
      color: #f1f5f9;
    }

    .container {
      max-width: 720px;
      margin: 80px auto;
      padding: 20px;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 40px;
    }

    .card {
      display: block;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px 22px;
      margin-bottom: 16px;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .desc {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .spacer {
      height: 20px;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #64748b;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #94a3b8;
      text-decoration: none;
    }

    .back:hover {
      color: #e2e8f0;
    }
  </style>
</head>

<body>
  <div class="container">
    <a class="card" href="#">
      <div class="title">Get CozyBoard</div>
      <div class="desc">
        <img src="/apps/cozyboard/assets/icon.png" width="72" style="border-radius:16px;margin-bottom:16px;"> Available on Google Play.
      </div>
    </a>

    <a class="back" href="/">← Back to Abixy</a>

    <h1>CozyBoard</h1>
    <div class="subtitle">
      Ambient soundboard for focus, relaxation, and calm.
    </div>

    <a class="card" href="/apps/cozyboard/privacy.html">
      <div class="title">Privacy Policy</div>
      <div class="desc">
        Learn how CozyBoard handles your data and protects your privacy.
      </div>
    </a>

    <a class="card" href="/apps/cozyboard/support.html">
      <div class="title">Support</div>
      <div class="desc">
        Need help or have feedback? Get in touch here.
      </div>
    </a>

    <div class="spacer"></div>

    <footer>
      © Abixy Development
    </footer>
  </div>
</body>

</html>
