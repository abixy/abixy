<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CozyBoard</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #121a24;
      color: #f1f5f9;
      overflow-x: hidden;
    }

    /* 🌌 AMBIENT BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 20% 30%, #2a3b4f, transparent 40%),
                  radial-gradient(circle at 80% 70%, #1e2a38, transparent 50%),
                  radial-gradient(circle at 50% 50%, #121a24, #0b1118);
      animation: drift 20s infinite alternate ease-in-out;
    }

    @keyframes drift {
      0% { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.1) translate(-20px, 10px); }
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .icon {
      width: 72px;
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 2.4rem;
      margin: 0;
    }

    .subtitle {
      color: #cbd5e1;
      margin-top: 8px;
    }

    .sign {
      width: 100%;
      max-width: 420px;
      margin-top: 24px;
      border-radius: 16px;
      opacity: 0.9;
    }

    /* ✨ CTA */
    .cta {
      display: block;
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 18px;
      text-decoration: none;
      color: white;
      margin: 30px 0;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .cta::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .cta:hover::after {
      opacity: 1;
    }

    .cta:hover {
      transform: translateY(-2px);
    }

    /* 🖼 GALLERY */
    .gallery {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      margin-bottom: 40px;
    }

    .gallery img {
      height: 380px;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.2s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* 📦 CARDS */
    .card {
      display: block;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin-bottom: 16px;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
    }

    .card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .title {
      font-weight: 600;
    }

    .desc {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #94a3b8;
      text-decoration: none;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #64748b;
      text-align: center;
    }

    /* 🪟 MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
    }

    .modal.active {
      display: flex;
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="container">

    <a class="back" href="/">← Back to Abixy</a>

    <div class="hero">
      <img class="icon" src="/apps/cozyboard/assets/icon.png" />
      <h1>CozyBoard</h1>
      <div class="subtitle">
        Ambient soundboard for focus, relaxation, and calm.
      </div>
      <img class="sign" src="/apps/cozyboard/assets/cozyboard-sign.png" />
    </div>

    <a class="cta" href="#">
      Get CozyBoard on Google Play
    </a>

    <div class="gallery" style="padding: 80;">
      <img src="/apps/cozyboard/assets/screenshot1.png">
      <img src="/apps/cozyboard/assets/screenshot2.png">
      <img src="/apps/cozyboard/assets/screenshot3.png">
      <img src="/apps/cozyboard/assets/screenshot4.png">
    </div>

    <a class="card" href="/apps/cozyboard/privacy.html">
      <div class="title">Privacy Policy</div>
      <div class="desc">Learn how your data is handled.</div>
    </a>

    <a class="card" href="/apps/cozyboard/support.html">
      <div class="title">Support</div>
      <div class="desc">Questions or feedback? Reach out.</div>
    </a>

    <footer>
      © Abixy Development
    </footer>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <img id="modalImg">
  </div>

  <script>
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modalImg');

    document.querySelectorAll('.gallery img').forEach(img => {
      img.onclick = () => {
        modal.classList.add('active');
        modalImg.src = img.src;
      };
    });

    modal.onclick = () => {
      modal.classList.remove('active');
    };
  </script>

</body>
</html>
