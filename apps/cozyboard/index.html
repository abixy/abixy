<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CozyBoard</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(180deg, #1e2a38, #121a24);
      color: #f1f5f9;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .icon {
      width: 72px;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 2.4rem;
      margin: 0;
    }

    .subtitle {
      color: #cbd5e1;
      margin-top: 8px;
    }

    .sign {
      width: 100%;
      max-width: 420px;
      margin-top: 24px;
      border-radius: 16px;
      opacity: 0.9;
    }

    /* CTA */
    .cta {
      display: block;
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 18px;
      text-decoration: none;
      color: white;
      margin: 30px 0;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .cta:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
    }

    /* GALLERY */
    .gallery {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 40px;
    }

    .gallery img {
      height: 380px;
      border-radius: 18px;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    /* CARDS */
    .card {
      display: block;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin-bottom: 16px;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
    }

    .card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .title {
      font-weight: 600;
    }

    .desc {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #94a3b8;
      text-decoration: none;
    }

    .back:hover {
      color: #e2e8f0;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">

    <a class="back" href="/">← Back to Abixy</a>

    <!-- HERO -->
    <div class="hero">
      <img class="icon" src="/apps/cozyboard/assets/icon.png" />
      <h1>CozyBoard</h1>
      <div class="subtitle">
        Ambient soundboard for focus, relaxation, and calm.
      </div>

      <img class="sign" src="/apps/cozyboard/assets/cozyboard-sign.png" />
    </div>

    <!-- CTA -->
    <a class="cta" href="#">
      Get CozyBoard on Google Play
    </a>

    <!-- SCREENSHOT GALLERY -->
    <div class="gallery">
      <img src="/apps/cozyboard/assets/screenshot1.png">
      <img src="/apps/cozyboard/assets/screenshot2.png">
      <img src="/apps/cozyboard/assets/screenshot3.png">
      <img src="/apps/cozyboard/assets/screenshot4.png">
    </div>

    <!-- LINKS -->
    <a class="card" href="/apps/cozyboard/privacy.html">
      <div class="title">Privacy Policy</div>
      <div class="desc">
        Learn how CozyBoard handles your data and protects your privacy.
      </div>
    </a>

    <a class="card" href="/apps/cozyboard/support.html">
      <div class="title">Support</div>
      <div class="desc">
        Need help or have feedback? Get in touch here.
      </div>
    </a>

    <footer>
      © Abixy Development
    </footer>
  </div>
</body>
</html>
